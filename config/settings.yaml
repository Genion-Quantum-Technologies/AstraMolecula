# AstraMolecula 配置文件
# 可通过环境变量覆盖：ASTRA_<SECTION>_<KEY> (如 ASTRA_DATABASE_HOST)

# ============ 服务器配置 ============
server:
  host: "0.0.0.0"
  port: 8000
  title: "DockingVina API"
  description: "Molecular docking task management and SMILES generation service"
  version: "2.1.0"

# ============ CORS 配置 ============
cors:
  allow_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "*"
  allow_credentials: true
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "*"

# ============ 数据库配置 ============
database:
  host: "127.0.0.1"
  port: 5432
  user: "admin"
  password: "secret"
  database: "mydatabase"
  pool:
    min_size: 1
    max_size: 10

# ============ 安全配置 ============
security:
  # JWT 配置
  jwt:
    secret_key: "YOUR_RANDOM_SECRET_KEY_32+_CHARS"  # 生产环境请修改！
    algorithm: "HS256"
    access_token_expire_minutes: 60
  
  # 服务间 API Keys（逗号分隔，或通过 SERVICE_API_KEYS 环境变量设置）
  service_api_keys:
    - "third-party-service-key-123"
    - "another-service-key-456"
    - "test-api-key-789"

# ============ 存储配置 (SeaweedFS) ============
storage:
  # API 类型: filer 或 s3
  api_type: "filer"
  
  # Filer API 配置
  filer_endpoint: "http://localhost:8888"
  bucket: "astramolecula"
  
  # S3 API 配置（备用）
  s3_endpoint: "http://localhost:8333"
  access_key: ""
  secret_key: ""
  
  # 临时文件目录
  temp_dir: "/tmp/astramolecula"
  
  # 预签名 URL 过期时间（秒）
  presigned_url_expires: 3600

# ============ API 配置 ============
api:
  # 前端 URL（用于生成重定向链接）
  frontend_base_url: ""
  
  # 缓存设置
  cache:
    file_cache_duration: 3600    # 文件缓存时间 (秒)
    status_cache_duration: 60    # 状态缓存时间 (秒)
  
  # 轮询设置
  polling:
    min_interval: 2              # 最小轮询间隔 (秒)
    max_interval: 30             # 最大轮询间隔 (秒)
    backoff_factor: 1.5          # 退避因子

# ============ 日志配置 ============
logging:
  level: "INFO"                  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: null                     # 日志文件路径，null 表示仅控制台输出

# ============ ML 模型配置 ============
ml:
  data:
    max_sequence_length: 256
    padding_value: 0
  properties:
    - "pki"
  test_property:
    lod_min: 1.0
    lod_max: 3.4
  
  # GPU 配置
  gpu:
    cuda_visible_devices: "0"    # 可见 GPU 设备
