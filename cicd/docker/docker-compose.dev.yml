# ============================================================
# AstraMolecula 开发环境 Docker Compose 配置
# 仅启动应用，使用本地/外部数据库
# ============================================================
# 
# 使用方式:
#   docker compose -f docker-compose.dev.yml up -d
#
# 注意: 在 Linux 上使用 172.17.0.1 连接宿主机服务
# ============================================================

services:
  app:
    build:
      context: ../..
      dockerfile: cicd/docker/Dockerfile
    image: astramolecula:latest
    container_name: astramolecula-dev
    environment:
      # 数据库配置 - 连接宿主机的 PostgreSQL
      # Linux: 使用 172.17.0.1 (docker0 网桥地址)
      # macOS/Windows: 使用 host.docker.internal
      ASTRA_DATABASE_HOST: 172.17.0.1
      ASTRA_DATABASE_PORT: 5432
      ASTRA_DATABASE_USER: admin
      ASTRA_DATABASE_PASSWORD: secret
      ASTRA_DATABASE_DATABASE: mydatabase
      # 存储配置 - 连接宿主机的 SeaweedFS
      SEAWEED_FILER_ENDPOINT: http://172.17.0.1:8888
      # 前端 URL
      FRONTEND_BASE_URL: https://api.genionaitech.com
      # 日志级别
      ASTRA_LOGGING_LEVEL: INFO
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

# 如需开发模式（挂载源码），取消下面的注释:
#    volumes:
#      - ../../src:/app/src:ro
#      - ../../my_toolsets:/app/my_toolsets:ro
#      - ../../resource:/app/resource:ro
