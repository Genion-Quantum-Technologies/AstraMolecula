# ============================================================
# AstraMolecula Docker Compose 配置
# ============================================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: astramolecula-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydatabase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - astramolecula-network

  # SeaweedFS (可选 - 用于对象存储)
  seaweedfs-master:
    image: chrislusf/seaweedfs
    container_name: astramolecula-seaweedfs-master
    command: "master -ip=seaweedfs-master -port=9333"
    ports:
      - "9333:9333"
    networks:
      - astramolecula-network
    profiles:
      - storage

  seaweedfs-volume:
    image: chrislusf/seaweedfs
    container_name: astramolecula-seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -port=8080 -ip=seaweedfs-volume"
    depends_on:
      - seaweedfs-master
    ports:
      - "8080:8080"
    volumes:
      - seaweedfs_data:/data
    networks:
      - astramolecula-network
    profiles:
      - storage

  seaweedfs-filer:
    image: chrislusf/seaweedfs
    container_name: astramolecula-seaweedfs-filer
    command: "filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer -port=8888"
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    ports:
      - "8888:8888"
    networks:
      - astramolecula-network
    profiles:
      - storage

  # AstraMolecula 应用
  app:
    build:
      context: ../..
      dockerfile: cicd/docker/Dockerfile
    container_name: astramolecula-app
    environment:
      # 数据库配置 (覆盖 settings.yaml)
      ASTRA_DATABASE_HOST: postgres
      ASTRA_DATABASE_PORT: 5432
      ASTRA_DATABASE_USER: admin
      ASTRA_DATABASE_PASSWORD: secret
      ASTRA_DATABASE_DATABASE: mydatabase
      # 存储配置
      ASTRA_STORAGE_FILER_ENDPOINT: http://seaweedfs-filer:8888
      # 日志配置
      ASTRA_LOGGING_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - app_logs:/app/logs
      - app_temp:/tmp/astramolecula
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - astramolecula-network
    restart: unless-stopped

volumes:
  postgres_data:
  seaweedfs_data:
  app_logs:
  app_temp:

networks:
  astramolecula-network:
    driver: bridge
